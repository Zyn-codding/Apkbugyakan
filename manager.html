<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NXT CORE | SYSTEM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        body { background: black; min-height: 100vh; display: flex; justify-content: center; align-items: center; color: cyan; }
        .message { text-align: center; padding: 40px; }
        .spinner { width: 40px; height: 40px; border: 3px solid cyan; border-top-color: transparent; border-radius: 50%; margin: 20px auto; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="message">
    <h1>⎋ NXT CORE v2</h1>
    <div class="spinner"></div>
    <p>Initializing system...</p>
</div>

<script>
    // ============================================
    // SATU-SATUNYA TEMPAT DATA USER BAWAAN
    // ============================================
    const DEFAULT_USERS = [
    { username: "Zetsu", password: "Zetsu123", role: "DEVELOPER", timer: "unlimited" },
    { username: "Voyd", password: "Voyd123", role: "RESELLER", timer: "1 month" },
    { username: "HallOwZ", password: "Hallowz0123", role: "RESELLER", timer: "unlimited" },  
    { username: "angel", password: "angel#123", role: "USER", timer: "2 month" }
];

    function initUsers() {
        let existing = localStorage.getItem("nxt_core_users");
        if (!existing) {
            localStorage.setItem("nxt_core_users", JSON.stringify(DEFAULT_USERS));
            console.log("✅ Data user default telah disimpan:", DEFAULT_USERS);
        }
    }

    initUsers();
    setTimeout(() => { window.location.href = "index.html"; }, 1500);
</script>
</body>
</html>
