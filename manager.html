<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NXT CORE | USER MANAGER</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        body { background: radial-gradient(circle at 20% 30%, #03050b, #000000); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .card { background: rgba(0, 20, 30, 0.75); backdrop-filter: blur(16px); border: 1px solid cyan; border-radius: 48px; padding: 32px 28px; width: 100%; max-width: 600px; }
        h2 { color: cyan; text-align: center; margin-bottom: 24px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0 16px; background: black; border: 1px solid cyan; border-radius: 40px; color: white; }
        .role-buttons, .timer-buttons { display: flex; flex-wrap: wrap; gap: 12px; margin: 16px 0; }
        .role-btn, .timer-btn { flex: 1; padding: 10px; background: #0ff1; border: 1px solid cyan; border-radius: 60px; color: white; text-align: center; cursor: pointer; }
        .role-btn.active, .timer-btn.active { background: cyan; color: black; font-weight: bold; box-shadow: 0 0 8px cyan; }
        .create-btn { width: 100%; padding: 14px; background: #333; border: none; border-radius: 60px; color: #888; cursor: not-allowed; margin-top: 20px; }
        .create-btn.active { background: cyan; color: black; cursor: pointer; }
        .back-link { display: block; text-align: center; margin-top: 24px; color: cyan; text-decoration: none; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #0a6; padding: 10px 20px; border-radius: 60px; color: white; display: none; z-index: 999; }
    </style>
</head>
<body>
<div class="card">
    <h2>🔐 USER MANAGER — ZETSU ONLY</h2>
    <input type="text" id="usernameInput" placeholder="Username">
    <input type="text" id="passwordInput" placeholder="Password">
    <div class="role-buttons"><div class="role-btn" data-role="user">👤 USER</div><div class="role-btn" data-role="reseller">🔄 RESELLER</div><div class="role-btn" data-role="partner">🤝 PARTNER</div><div class="role-btn" data-role="owner">👑 OWNER</div></div>
    <div class="timer-buttons"><div class="timer-btn" data-timer="1 day">1 DAY</div><div class="timer-btn" data-timer="1 week">1 WEEK</div><div class="timer-btn" data-timer="1 month">1 MONTH</div><div class="timer-btn" data-timer="2 month">2 MONTH</div><div class="timer-btn" data-timer="unlimited">UNLIMITED</div></div>
    <button id="createBtn" class="create-btn">⚡ CREATE AKUN ⚡</button>
    <a href="dashboard.html" class="back-link">← Kembali ke Dashboard</a>
</div>
<div id="toastMsg" class="toast"></div>

<script>
    let currentUser = JSON.parse(localStorage.getItem("nxt_user") || "{}");
    if (!currentUser || currentUser.username !== "zetsu") { alert("⛔ Hanya ZETSU yang bisa akses!"); window.location.href = "dashboard.html"; }
    let selectedRole = null, selectedTimer = null;
    function loadUsers() { let raw = localStorage.getItem("nxt_core_users"); if (!raw) { let defaultUsers = [{ username: "zetsu", password: "QuantumTeams", role: "OWNER", timer: "unlimited" }]; localStorage.setItem("nxt_core_users", JSON.stringify(defaultUsers)); return defaultUsers; } return JSON.parse(raw); }
    function saveUsers(users) { localStorage.setItem("nxt_core_users", JSON.stringify(users)); }
    function showToast(msg, isError = false) { let toast = document.getElementById("toastMsg"); toast.innerText = msg; toast.style.background = isError ? "#a22" : "#0a6"; toast.style.display = "block"; setTimeout(() => toast.style.display = "none", 2500); }
    function activateCreateButton() { if (selectedRole && selectedTimer) document.getElementById("createBtn").classList.add("active"); else document.getElementById("createBtn").classList.remove("active"); }
    document.querySelectorAll(".role-btn").forEach(btn => btn.addEventListener("click", () => { document.querySelectorAll(".role-btn").forEach(b => b.classList.remove("active")); btn.classList.add("active"); selectedRole = btn.getAttribute("data-role"); activateCreateButton(); }));
    document.querySelectorAll(".timer-btn").forEach(btn => btn.addEventListener("click", () => { document.querySelectorAll(".timer-btn").forEach(b => b.classList.remove("active")); btn.classList.add("active"); selectedTimer = btn.getAttribute("data-timer"); activateCreateButton(); }));
    document.getElementById("createBtn").addEventListener("click", () => { if (!selectedRole || !selectedTimer) { showToast("Pilih ROLE dan TIMER dulu!", true); return; } let username = document.getElementById("usernameInput").value.trim(); let password = document.getElementById("passwordInput").value.trim(); if (!username || !password) { showToast("Isi username & password!", true); return; } let users = loadUsers(); if (users.find(u => u.username === username)) { showToast("Username sudah ada!", true); return; } users.push({ username, password, role: selectedRole.toUpperCase(), timer: selectedTimer, createdBy: currentUser.username }); saveUsers(users); showToast(`✅ Akun ${username} (${selectedRole.toUpperCase()}) dibuat dengan timer ${selectedTimer}`); document.getElementById("usernameInput").value = ""; document.getElementById("passwordInput").value = ""; selectedRole = null; selectedTimer = null; document.querySelectorAll(".role-btn, .timer-btn").forEach(b => b.classList.remove("active")); activateCreateButton(); });
</script>
</body>
</html>
